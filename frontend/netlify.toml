# Netlify build config for the AI Jury frontend.
# This file lives in /frontend so Netlify deploys treat that as the project root.
[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist"

[build.environment]
  # Backend (Render) URL — baked into the bundle at build time.
  VITE_API_URL = "https://ai-jury-api.onrender.com"
  NODE_VERSION = "20"

# SPA routing — every URL serves index.html so React Router can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
