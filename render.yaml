# Render.com blueprint — autodetected when you point Render at this repo.
# Creates one Web Service from the backend folder. Set all `sync: false`
# secrets in the Render dashboard after the service is created.
services:
  - type: web
    name: ai-jury-api
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: MODERATOR_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: HEYGEN_API_KEY
        sync: false
      - key: HEYGEN_AVATAR_ID
        sync: false
      - key: HEYGEN_VOICE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_CASES
        value: cases
      - key: SUPABASE_BUCKET_RENDERS
        value: renders
